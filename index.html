<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <meta
      name="description"
      content="Ark — configurable spreadsheet UI for roadmap and data backed by your API."
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />

    <title>Ark</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root" class="app">
      <header class="app-chrome">
        <div class="app-chrome__row app-chrome__row--top">
          <i class="ph ph-squares-four" style="font-size: 1.25rem; color: #6b6b6b;" aria-hidden="true"></i>
          <h1 class="app-chrome__title" id="app-chrome-title">Ark</h1>
          <div
            class="app-chrome__actions"
            id="app-chrome-actions"
            role="toolbar"
            aria-label="Sheet actions"
          ></div>
        </div>
        <div class="app-chrome__row app-chrome__row--toolbar" aria-label="Formatting toolbar">
          <div id="formatting-toolbar-mount"></div>
        </div>
      </header>

      <div id="partner-error" class="app-partner-error" hidden></div>

      <div
        class="app-sheet-wrap"
        id="sheet-panel"
        role="tabpanel"
        aria-labelledby="sheet-tab-placeholder"
      >
        <div id="sheet-mount" class="app-sheet-mount"></div>
      </div>

      <nav class="app-sheet-tabs" id="sheet-tabs" aria-label="Sheet views" role="tablist"></nav>
    </div>

    <script src="/src/main.ts" type="module"></script>
  </body>
</html>
